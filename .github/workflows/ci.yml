name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  coach:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/coach
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - name: Test
        env:
          RELINK_LLM_PROVIDER: mock
          RELINK_ALLOW_MOCK_FALLBACK: "1"
        run: pytest -q

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npx tsc --noEmit
      - name: Build
        env:
          COACH_URL: http://127.0.0.1:8787
        run: npm run build
